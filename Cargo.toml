[package]
name = "ws63-hal"
version = "0.1.0"
edition = "2024"
description = "Hardware Abstraction Layer for HiSilicon WS63 (RISC-V RV32IMFC_Zicsr)"
license = "MIT"
repository = "https://github.com/sanchuanhehe/ws63-hal"
keywords = ["ws63", "hisilicon", "riscv", "embedded", "hal"]
categories = ["embedded", "no-std", "hardware-support"]

[dependencies]
ws63-pac = { version = "0.1", git = "https://github.com/sanchuanhehe/ws63-pac", features = ["critical-section", "rt"] }
embedded-hal = "1.0.0"
embedded-hal-nb = "1.0"
embedded-io = "0.6"
nb = "1"
cfg-if = "1"
paste = "1"
portable-atomic = { version = "1", default-features = false }

critical-section = { version = "1", optional = true }
riscv = "0.13"

[features]
default = ["rt", "dep:critical-section"]
rt = ["ws63-pac/rt", "dep:critical-section"]

[profile.release]
opt-level = "s"
lto = true

[profile.dev]
opt-level = "s"
