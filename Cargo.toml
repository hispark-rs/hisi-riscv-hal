[package]
name = "ws63-hal"
version = "0.2.1"
edition = "2024"
description = "Hardware Abstraction Layer for HiSilicon WS63 (RISC-V RV32IMFC_Zicsr)"
license = "MIT"
repository = "https://github.com/sanchuanhehe/ws63-hal"
keywords = ["ws63", "hisilicon", "riscv", "embedded", "hal"]
categories = ["embedded", "no-std", "hardware-support"]

[dependencies]
ws63-pac = { version = "0.1", features = ["critical-section", "rt"] }
embedded-hal = "1.0.0"
embedded-hal-nb = "1.0"
embedded-io = "0.6"
nb = "1"
cfg-if = "1"
# The WS63 core has no atomic extension; on the no-atomic target portable-atomic
# uses a critical-section polyfill instead of native lr.w/sc.w (which would trap).
portable-atomic = { version = "1", default-features = false, features = ["critical-section"] }

critical-section = { version = "1", optional = true }

[dev-dependencies]
proptest = "1"
# Host unit tests (`cargo test --target x86_64`) compile the whole lib, including
# ws63-pac's `critical-section`-gated `Peripherals::take()`; pull a real
# critical-section impl (std) so the test binary links. Not in the firmware graph.
critical-section = { version = "1", features = ["std"] }

[features]
default = ["rt", "dep:critical-section"]
rt = ["ws63-pac/rt", "dep:critical-section"]

[profile.release]
opt-level = "s"
lto = true

[profile.dev]
opt-level = "s"

# Standalone builds (this repo's own CI) pull ws63-pac from crates.io, where the
# published version lags the generated PAC (e.g. missing KM registers / the host
# riscv-gating), breaking the build. Patch to the git PAC so standalone CI builds
# against the current source. IGNORED inside the ws63-rs workspace, whose root
# manifest patches ws63-pac to the local path (only the workspace-root [patch] applies).
[patch.crates-io]
ws63-pac = { git = "https://github.com/sanchuanhehe/ws63-pac" }
