name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      # chip-ws63/chip-bs21 are mutually exclusive — test each, not --all-features.
      - run: cargo check --no-default-features --features chip-ws63,rt,async,embassy
      - run: cargo check --no-default-features --features chip-bs21,rt
      - run: cargo clippy --no-default-features --features chip-ws63,rt,async,embassy -- -D warnings
      - run: cargo clippy --no-default-features --features chip-bs21,rt -- -D warnings
      - run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
