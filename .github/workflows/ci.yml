name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # NB: chip-ws63 and chip-bs21 are mutually exclusive (a compile_error in lib.rs),
  # so `--all-features` cannot be used. Test each chip with its supported feature
  # set instead. async/embassy are only wired for chip-ws63 today (bs2x-pac lacks
  # the async TIMER interrupts), so chip-bs21 is checked at its M1 feature level.
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["chip-ws63,rt,async,embassy", "chip-bs21,rt"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --no-default-features --features "${{ matrix.features }}" -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["chip-ws63,rt,async,embassy", "chip-bs21,rt"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features --features "${{ matrix.features }}"
      - run: cargo check --no-default-features --features "${{ matrix.features }}" --release

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # Catch accidental SemVer-incompatible API changes: compares this crate's public
  # API against the last release on crates.io and fails if the change level (patch
  # / minor / major) is not reflected in the version bump. A breaking change with
  # no bump turns the PR red — exactly when an API tightening (e.g. a `configure`
  # signature change) needs a 0.x-minor bump. Runs on the host (the lib compiles
  # for x86_64 — same as the unit tests); the action installs cargo-semver-checks
  # and the nightly rustdoc it needs. chip-ws63/chip-bs21 are mutually exclusive,
  # so we check the default-features group (chip-ws63) rather than --all-features.
  semver:
    name: SemVer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo-semver-checks (vs last crates.io release)
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: default-features