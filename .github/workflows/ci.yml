name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # NB: chip-ws63 and chip-bs21 are mutually exclusive (a compile_error in lib.rs),
  # so `--all-features` cannot be used. Test each chip with its supported feature
  # set instead. async/embassy are only wired for chip-ws63 today (bs2x-pac lacks
  # the async TIMER interrupts), so chip-bs21 is checked at its M1 feature level.
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["chip-ws63,rt,async,embassy", "chip-ws63,rt,async,embassy,defmt", "chip-bs21,rt"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --no-default-features --features "${{ matrix.features }}" -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["chip-ws63,rt,async,embassy", "chip-ws63,rt,async,embassy,defmt", "chip-bs21,rt"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check --no-default-features --features "${{ matrix.features }}"
      - run: cargo check --no-default-features --features "${{ matrix.features }}" --release

  doc:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # The HAL has no default chip (esp-hal style) — docs must select one, matching
      # the [package.metadata.docs.rs] feature set.
      - run: cargo doc --no-deps --document-private-items --no-default-features --features "chip-ws63,rt,async,embassy"
        env:
          RUSTDOCFLAGS: -D warnings