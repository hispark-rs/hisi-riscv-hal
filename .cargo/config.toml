# Standalone HAL builds resolve the PACs from crates.io by default. Patch them to
# the current source repositories so optional BS2X dependencies resolve there too.
[patch.crates-io]
ws63-pac = { git = "https://github.com/hispark-rs/ws63-pac" }
bs2x-pac = { git = "https://github.com/hispark-rs/bs2x-pac" }

[profile.release]
opt-level = "s"
lto = true

[profile.dev]
opt-level = "s"
